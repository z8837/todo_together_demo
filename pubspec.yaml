name: todotogether
description: "Public portfolio demo extracted from the Todo Together production app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.1
  auto_size_text: ^3.0.0
  dio: ^5.9.0
  retrofit: ^4.6.0
  json_annotation: ^4.9.0
  path_provider: ^2.1.4
  isar_community: 3.3.0
  isar_community_flutter_libs: 3.3.0
  home_widget: ^0.9.0
  flutter_keyboard_visibility: ^6.0.0
  pull_to_refresh: ^2.0.0
  skeletonizer: ^2.1.1
  sliding_up_panel: ^2.0.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  retrofit_generator: ^10.0.2
  build_runner: ^2.7.1
  json_serializable: ^6.6.1
  isar_community_generator: 3.3.0

flutter:
  uses-material-design: true
